name: ✨ Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea clearly.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of feature is this?
      options:
        - New Algorithm/Data Structure
        - New LeetCode Problem
        - Documentation Improvement
        - Tooling/CLI
        - Visualization/Notebook
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide examples of how this feature would be used
      render: python
      placeholder: |
        # Example usage
        pass

  - type: dropdown
    id: willingness
    attributes:
      label: Would you like to implement this feature?
      options:
        - "Yes, I'd like to submit a PR"
        - "No, I'm just suggesting"
        - "Maybe, need more info"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, links, or references
