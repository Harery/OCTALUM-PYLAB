name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.
          githubBaseUrl: ${{ github.api_url }}

  lint-changed-files:
    name: Lint Changed Files
    runs-on: ubuntu-latest
    needs: [validate-pr-title]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED_PY=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' || true)
          echo "python_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_PY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "has_py_files=$([[ -n \"$CHANGED_PY\" ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Run Ruff on changed files
        if: steps.changed-files.outputs.has_py_files == 'true'
        run: |
          IFS=$'\n' read -r -a FILES <<< "${{ steps.changed-files.outputs.python_files }}"
          for file in "${FILES[@]}"; do
            if [[ -f "$file" ]]; then
              echo "Checking: $file"
              uv run ruff check "$file" --output-format=github
              uv run ruff format --check "$file" --diff
            fi
          done

      - name: Run Pyright on changed files
        if: steps.changed-files.outputs.has_py_files == 'true'
        run: |
          uv run pyright ${{ steps.changed-files.outputs.python_files }} --warnings

  add-size-label:
    name: Add Size Label
    runs-on: ubuntu-latest
    needs: [validate-pr-title]
    steps:
      - name: Add size label based on changes
        uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {
              "XS": 0,
              "S": 10,
              "M": 50,
              "L": 200,
              "XL": 500,
              "XXL": 1000
            }

  welcome-contributor:
    name: Welcome First-Time Contributor
    runs-on: ubuntu-latest
    needs: [validate-pr-title]
    if: github.event.action == 'opened'
    steps:
      - name: Check if first-time contributor
        id: check-contributor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          PR_COUNT=$(gh api "repos/$REPO/pulls" \
            --jq "[.[] | select(.user.login == \"$AUTHOR\") | .number] | length")

          if [[ "$PR_COUNT" -le 1 ]]; then
            echo "is_first_time=true" >> $GITHUB_OUTPUT
          else
            echo "is_first_time=false" >> $GITHUB_OUTPUT
          fi

      - name: Welcome message
        if: steps.check-contributor.outputs.is_first_time == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            const author = context.payload.pull_request.user.login;

            const welcomeMessage = `## 🎉 Welcome to OCTALUM-PYLAB!

            Thank you @${author} for your first contribution! We're excited to have you here.

            ### 📋 Quick Checklist
            - [ ] Code follows our style guidelines (Ruff will check)
            - [ ] Tests are added/updated for new functionality
            - [ ] Documentation is updated if needed
            - [ ] PR title follows [Conventional Commits](https://www.conventionalcommits.org/)

            ### 📚 Helpful Resources
            - [Contributing Guide](CONTRIBUTING.md)
            - [Code of Conduct](CODE_OF_CONDUCT.md)
            - [Project Structure](README.md#-directory-structure)

            Our team will review your PR soon. Thank you for helping make OCTALUM-PYLAB better! 🚀

            <details>
            <summary>💡 Tips for a Smooth Review</summary>

            1. **Keep PRs focused** - One feature/fix per PR
            2. **Write clear descriptions** - Explain what and why
            3. **Add tests** - Help us maintain quality
            4. **Be responsive** - Address feedback promptly

            </details>`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: welcomeMessage
            });

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate-pr-title, lint-changed-files, add-size-label]
    if: always()
    steps:
      - name: Create PR Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;

            const titleStatus = '${{ needs.validate-pr-title.result }}' === 'success' ? '✅' : '❌';
            const lintStatus = '${{ needs.lint-changed-files.result }}' === 'success' ? '✅' : '❌';
            const labelStatus = '${{ needs.add-size-label.result }}' === 'success' ? '✅' : '❌';

            const summary = `## 🔍 PR Check Results

            | Check | Status |
            |-------|--------|
            | PR Title (Conventional Commits) | ${titleStatus} |
            | Lint Changed Files | ${lintStatus} |
            | Size Label | ${labelStatus} |

            ${titleStatus === '✅' && lintStatus === '✅' ? '### ✅ All checks passed! Ready for review.' : '### ⚠️ Some checks failed. Please review the details above.'}`;

            core.summary.addRaw(summary);
            await core.summary.write();
